# ============================================================
# Decap CMS — ZEN PHARM yönetim paneli yapılandırması
# Panel adresi: https://SITENIZ/admin/
# ============================================================

backend:
  name: git-gateway
  branch: main # dalınız "master" ise burayı değiştirin

# Yönetim paneli arayüz dili
locale: "tr"

# Yüklenen görsellerin kaydedileceği klasör
media_folder: "assets/images"
public_folder: "/assets/images"

# Önizleme yok — site kendi JS'i ile render ediliyor
editor:
  preview: false

collections:
  # ==========================================================
  # ÜRÜNLER
  # ==========================================================
  - name: "products"
    label: "Ürünler"
    files:
      # --------------------------------------------------
      # ÜRÜN 1 — S25 Wall Unit
      # --------------------------------------------------
      - name: "product1"
        label: "Ürün 1 — S25 Wall Unit"
        file: "content/product1.json"
        fields:
          - label: "Ürün fotoğrafı (product-1-new)"
            name: "image"
            widget: "image"
            hint: "S25 Wall Unit ürününün tek statik fotoğrafı"

          - label: "Türkçe (TR)"
            name: "tr"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Alt başlık", name: "sub", widget: "string" }
              - { label: "Açıklama", name: "desc", widget: "text" }
              - label: "Özellikler (8 madde)"
                name: "features"
                widget: "list"
                min: 8
                max: 8
                field: { label: "Madde", name: "item", widget: "string" }

          - label: "Rusça (RU)"
            name: "ru"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Alt başlık", name: "sub", widget: "string" }
              - { label: "Açıklama", name: "desc", widget: "text" }
              - label: "Özellikler (8 madde)"
                name: "features"
                widget: "list"
                min: 8
                max: 8
                field: { label: "Madde", name: "item", widget: "string" }

          - label: "İngilizce (EN)"
            name: "en"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Alt başlık", name: "sub", widget: "string" }
              - { label: "Açıklama", name: "desc", widget: "text" }
              - label: "Özellikler (8 madde)"
                name: "features"
                widget: "list"
                min: 8
                max: 8
                field: { label: "Madde", name: "item", widget: "string" }

          - label: "Özbekçe (UZ)"
            name: "uz"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Alt başlık", name: "sub", widget: "string" }
              - { label: "Açıklama", name: "desc", widget: "text" }
              - label: "Özellikler (8 madde)"
                name: "features"
                widget: "list"
                min: 8
                max: 8
                field: { label: "Madde", name: "item", widget: "string" }

      # --------------------------------------------------
      # ÜRÜN 2 — Pharmafix
      # --------------------------------------------------
      - name: "product2"
        label: "Ürün 2 — Pharmafix"
        file: "content/product2.json"
        fields:
          - label: "Fotoğraf 1 (product-two-new-photo)"
            name: "photo1"
            widget: "image"
            hint: "Pharmafix slider ilk fotoğrafı"
          - label: "Fotoğraf 2 (product-2-new-photo)"
            name: "photo2"
            widget: "image"
            hint: "Pharmafix slider ikinci fotoğrafı"

          - label: "Türkçe (TR)"
            name: "tr"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Alt başlık", name: "sub", widget: "string" }
              - { label: "Açıklama", name: "desc", widget: "text" }
              - label: "Özellikler (6 madde)"
                name: "features"
                widget: "list"
                min: 6
                max: 6
                field: { label: "Madde", name: "item", widget: "string" }
              - { label: "Kapanış paragrafı", name: "closing", widget: "text" }

          - label: "Rusça (RU)"
            name: "ru"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Alt başlık", name: "sub", widget: "string" }
              - { label: "Açıklama", name: "desc", widget: "text" }
              - label: "Özellikler (6 madde)"
                name: "features"
                widget: "list"
                min: 6
                max: 6
                field: { label: "Madde", name: "item", widget: "string" }
              - { label: "Kapanış paragrafı", name: "closing", widget: "text" }

          - label: "İngilizce (EN)"
            name: "en"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Alt başlık", name: "sub", widget: "string" }
              - { label: "Açıklama", name: "desc", widget: "text" }
              - label: "Özellikler (6 madde)"
                name: "features"
                widget: "list"
                min: 6
                max: 6
                field: { label: "Madde", name: "item", widget: "string" }
              - { label: "Kapanış paragrafı", name: "closing", widget: "text" }

          - label: "Özbekçe (UZ)"
            name: "uz"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Alt başlık", name: "sub", widget: "string" }
              - { label: "Açıklama", name: "desc", widget: "text" }
              - label: "Özellikler (6 madde)"
                name: "features"
                widget: "list"
                min: 6
                max: 6
                field: { label: "Madde", name: "item", widget: "string" }
              - { label: "Kapanış paragrafı", name: "closing", widget: "text" }

  # ==========================================================
  # İLETİŞİM VE DOSYALAR
  # ==========================================================
  - name: "settings"
    label: "İletişim ve dosyalar"
    files:
      - name: "contacts"
        label: "İletişim"
        file: "content/contacts.json"
        fields:
          - { label: "Telefon", name: "phone", widget: "string", hint: "İletişim sayfasında ve tüm sayfaların altbilgisinde görünür" }
          - { label: "E-posta (Email)", name: "email", widget: "string" }
          - { label: "Instagram", name: "instagram", widget: "string", hint: "@ ile veya @ olmadan, örn: @zendorixonamebel" }
          - { label: "Çalışma saatleri", name: "hours", widget: "string", hint: "Örn: 09:00 – 18:00" }
          - label: "Adres (her dilde)"
            name: "address"
            widget: "object"
            fields:
              - { label: "Adres (RU)", name: "ru", widget: "string" }
              - { label: "Adres (TR)", name: "tr", widget: "string" }
              - { label: "Adres (EN)", name: "en", widget: "string" }
              - { label: "Adres (UZ)", name: "uz", widget: "string" }

      - name: "catalog"
        label: "Katalog (PDF)"
        file: "content/catalog.json"
        fields:
          - label: "Katalog PDF dosyası"
            name: "file"
            widget: "file"
            media_folder: "/files"
            public_folder: "/files"
            hint: "Yeni PDF yükleyin — sitedeki «Kataloğu indir» butonları otomatik olarak bunu verecek"

  # ==========================================================
  # KATEGORİLER VE ÜRÜNLER (dinamik ürün sayfaları)
  # ==========================================================
  - name: "store"
    label: "Kategoriler ve ürünler"
    files:
      - name: "store"
        label: "Kategoriler ve ürünler"
        file: "content/store.json"
        fields:
          - label: "Kategoriler"
            name: "categories"
            widget: "list"
            collapsed: true
            summary: "{{fields.id}}"
            fields:
              - { label: "Kategori ID (latin harflerle, boşluksuz)", name: "id", widget: "string", hint: "Örn: shelving" }
              - label: "Kategori adı"
                name: "name"
                widget: "object"
                fields:
                  - { label: "RU", name: "ru", widget: "string" }
                  - { label: "TR", name: "tr", widget: "string" }
                  - { label: "EN", name: "en", widget: "string" }
                  - { label: "UZ", name: "uz", widget: "string" }

          - label: "Ürünler"
            name: "products"
            widget: "list"
            collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: "Ürün ID (latin harflerle, boşluksuz)", name: "id", widget: "string", hint: "Ürün sayfası şu adreste açılır: product.html?id=SİZİN-ID" }
              - { label: "Ürün adı", name: "title", widget: "string" }
              - { label: "Kategori ID", name: "category", widget: "string", hint: "Yukarıdaki kategorilerden birinin ID'sini yazın, örn: shelving" }
              - { label: "Fiyat (isteğe bağlı)", name: "price", widget: "string", required: false, hint: "Örn: 4 500 000 sum'dan başlayan" }
              - label: "Ürün fotoğrafları"
                name: "photos"
                widget: "list"
                field: { label: "Fotoğraf", name: "image", widget: "image" }

              - label: "Türkçe (TR)"
                name: "tr"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Alt başlık", name: "sub", widget: "string" }
                  - { label: "Açıklama", name: "desc", widget: "text" }
                  - label: "Özellikler"
                    name: "features"
                    widget: "list"
                    required: false
                    field: { label: "Madde", name: "item", widget: "string" }
                  - { label: "Kapanış paragrafı", name: "closing", widget: "text", required: false }

              - label: "Rusça (RU)"
                name: "ru"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Alt başlık", name: "sub", widget: "string" }
                  - { label: "Açıklama", name: "desc", widget: "text" }
                  - label: "Özellikler"
                    name: "features"
                    widget: "list"
                    required: false
                    field: { label: "Madde", name: "item", widget: "string" }
                  - { label: "Kapanış paragrafı", name: "closing", widget: "text", required: false }

              - label: "İngilizce (EN)"
                name: "en"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Alt başlık", name: "sub", widget: "string" }
                  - { label: "Açıklama", name: "desc", widget: "text" }
                  - label: "Özellikler"
                    name: "features"
                    widget: "list"
                    required: false
                    field: { label: "Madde", name: "item", widget: "string" }
                  - { label: "Kapanış paragrafı", name: "closing", widget: "text", required: false }

              - label: "Özbekçe (UZ)"
                name: "uz"
                widget: "object"
                collapsed: true
                fields:
                  - { label: "Alt başlık", name: "sub", widget: "string" }
                  - { label: "Açıklama", name: "desc", widget: "text" }
                  - label: "Özellikler"
                    name: "features"
                    widget: "list"
                    required: false
                    field: { label: "Madde", name: "item", widget: "string" }
                  - { label: "Kapanış paragrafı", name: "closing", widget: "text", required: false }
